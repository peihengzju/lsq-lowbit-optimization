<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1160" viewBox="0 0 1500 1160" role="img" aria-labelledby="title desc">
  <title id="title">INT4 CUDA Inference Project Overview</title>
  <desc id="desc">A GitHub-friendly overview figure showing the baseline LSQ path, converted low-bit path, runtime backend, evaluation scripts, and shared dataset and tests.</desc>

  <defs>
    <style>
      .bg { fill: #ffffff; }

      .title { font: 700 30px sans-serif; fill: #111827; }
      .subtitle { font: 400 16px sans-serif; fill: #4b5563; }

      .section { font: 700 19px sans-serif; fill: #1f2937; }
      .label { font: 700 18px sans-serif; fill: #111827; }
      .small { font: 400 15px sans-serif; fill: #6b7280; }
      .mono { font: 400 13px monospace; fill: #6b7280; }
      .legend { font: 600 13px sans-serif; fill: #1f2937; }

      .box {
        fill: #ffffff;
        stroke: #4b5563;
        stroke-width: 2;
        rx: 16;
      }
      .boxBlue { fill: #eef4ff; stroke: #4a78d3; }
      .boxOrange { fill: #fff4ea; stroke: #d97706; }
      .boxGreen { fill: #eef9f1; stroke: #2f855a; }
      .boxGray { fill: #f8fafc; stroke: #7b8798; }

      .tagText { font: 700 11px sans-serif; fill: #ffffff; letter-spacing: 0.3px; }
      .tagFn { fill: #2563eb; }
      .tagSrc { fill: #ea580c; }
      .tagExt { fill: #64748b; }
      .tagData { fill: #16a34a; }

      .arrowBlue { stroke: #4a78d3; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrowOrange { stroke: #d97706; stroke-width: 3.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrowGray { stroke: #94a3b8; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrowDashed { stroke: #94a3b8; stroke-width: 2.6; stroke-dasharray: 8 7; fill: none; stroke-linecap: round; stroke-linejoin: round; }

      .guide { stroke: #e5e7eb; stroke-width: 1.5; fill: none; }
    </style>

    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" viewBox="0 0 12 12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4a78d3"/>
    </marker>
    <marker id="arrow-orange" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" viewBox="0 0 12 12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d97706"/>
    </marker>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" viewBox="0 0 12 12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1160" class="bg"/>

  <text x="60" y="70" class="title">INT4 CUDA Inference: Project Overview</text>
  <text x="60" y="100" class="subtitle">LSQ checkpoint import -&gt; selective module conversion -&gt; INT4/INT8 runtime backend -&gt; evaluation, profiling, and benchmarks</text>

  <text x="100" y="160" class="section">Inputs</text>
  <text x="430" y="160" class="section">Load / Convert</text>
  <text x="760" y="160" class="section">Models / Modules</text>
  <text x="1090" y="160" class="section">Runtime / Validation</text>

  <line x1="60" y1="185" x2="1440" y2="185" class="guide"/>
  <line x1="60" y1="900" x2="1440" y2="900" class="guide"/>

  <text x="60" y="220" class="section">Baseline path</text>
  <text x="60" y="430" class="section">Converted low-bit path</text>
  <text x="60" y="930" class="section">Shared data / tests</text>

  <!-- Baseline -->
  <rect x="90" y="250" width="280" height="118" class="box boxGray"/>
  <rect x="110" y="264" width="64" height="22" rx="11" class="tagExt"/>
  <text x="118" y="279" class="tagText">External</text>
  <text x="115" y="309" class="label">LSQ repo</text>
  <text x="115" y="332" class="small">Model definitions and</text>
  <text x="115" y="349" class="small">LSQ quantization baseline</text>

  <rect x="420" y="250" width="290" height="118" class="box boxBlue"/>
  <rect x="440" y="264" width="64" height="22" rx="11" class="tagFn"/>
  <text x="448" y="279" class="tagText">Function</text>
  <text x="445" y="309" class="label">build_lsq_model_from_ckpt(...)</text>
  <text x="445" y="332" class="mono">quant_pipeline/integration/</text>
  <text x="445" y="349" class="mono">lsq_adapter.py</text>

  <rect x="760" y="250" width="280" height="118" class="box boxBlue"/>
  <text x="785" y="309" class="label">Native LSQ model</text>
  <text x="785" y="332" class="small">Unmodified model path used as</text>
  <text x="785" y="349" class="small">the baseline</text>

  <rect x="1090" y="250" width="350" height="118" class="box boxBlue"/>
  <rect x="1110" y="264" width="60" height="22" rx="11" class="tagSrc"/>
  <text x="1122" y="279" class="tagText">Source</text>
  <text x="1115" y="309" class="label">Native LSQ evaluation</text>
  <text x="1115" y="332" class="mono">scripts/eval_lsq_imagenet.py</text>

  <!-- Converted -->
  <rect x="90" y="470" width="280" height="118" class="box boxGray"/>
  <rect x="110" y="484" width="64" height="22" rx="11" class="tagExt"/>
  <text x="118" y="499" class="tagText">External</text>
  <text x="115" y="529" class="label">FP / LSQ checkpoints</text>
  <text x="115" y="552" class="small">Weights and quantization scales</text>

  <rect x="420" y="470" width="290" height="118" class="box boxOrange"/>
  <rect x="440" y="484" width="64" height="22" rx="11" class="tagFn"/>
  <text x="448" y="499" class="tagText">Function</text>
  <text x="445" y="529" class="label">convert_lsq_modules(...)</text>
  <text x="445" y="552" class="mono">quant_pipeline/integration/</text>
  <text x="445" y="569" class="mono">lsq_adapter.py</text>

  <rect x="760" y="440" width="280" height="118" class="box boxOrange"/>
  <rect x="780" y="454" width="60" height="22" rx="11" class="tagSrc"/>
  <text x="792" y="469" class="tagText">Source</text>
  <text x="785" y="499" class="label">Custom low-bit modules</text>
  <text x="785" y="522" class="mono">quant_pipeline/ops/int4_linear.py</text>
  <text x="785" y="539" class="mono">quant_pipeline/ops/int4_conv2d.py</text>

  <rect x="760" y="595" width="280" height="118" class="box boxOrange"/>
  <text x="785" y="654" class="label">Converted LSQ model</text>
  <text x="785" y="677" class="small">Partially replaced model for</text>
  <text x="785" y="694" class="small">converted runs</text>

  <rect x="1090" y="440" width="350" height="160" class="box boxOrange"/>
  <rect x="1110" y="454" width="60" height="22" rx="11" class="tagSrc"/>
  <text x="1122" y="469" class="tagText">Source</text>
  <text x="1115" y="499" class="label">Custom runtime backend</text>
  <text x="1115" y="532" class="mono">quant_pipeline/ops/int4_int8_gemm.py</text>
  <text x="1115" y="558" class="mono">csrc/int4_int8_ext.cpp</text>
  <text x="1115" y="584" class="mono">csrc/int4_int8_kernels.cu</text>

  <rect x="1090" y="670" width="168" height="120" class="box boxOrange"/>
  <rect x="1110" y="684" width="60" height="22" rx="11" class="tagSrc"/>
  <text x="1122" y="699" class="tagText">Source</text>
  <text x="1115" y="729" class="label">Eval + profiling</text>
  <text x="1100" y="752" class="mono">eval_lsq_imagenet.py</text>
  <text x="1100" y="769" class="mono">profile_lsq_inference.py</text>

  <rect x="1272" y="670" width="168" height="120" class="box boxOrange"/>
  <rect x="1292" y="684" width="60" height="22" rx="11" class="tagSrc"/>
  <text x="1304" y="699" class="tagText">Source</text>
  <text x="1297" y="729" class="label">Benchmarks</text>
  <text x="1287" y="752" class="mono">benchmark_lsq_fc.py</text>
  <text x="1287" y="769" class="mono">benchmark_inference.py</text>

  <!-- Shared -->
  <rect x="180" y="970" width="430" height="92" class="box boxGreen"/>
  <rect x="200" y="984" width="48" height="20" rx="10" class="tagData"/>
  <text x="214" y="998" class="tagText">Data</text>
  <text x="205" y="1028" class="label">ImageNet val dataset</text>
  <text x="205" y="1048" class="small">Used by native eval and converted profiling</text>

  <rect x="1000" y="970" width="430" height="92" class="box boxGreen"/>
  <rect x="1020" y="984" width="60" height="20" rx="10" class="tagSrc"/>
  <text x="1032" y="998" class="tagText">Source</text>
  <text x="1025" y="1028" class="label">tests/test_int4_pack.py</text>
  <text x="1025" y="1048" class="small">Validates the packing utilities path</text>

  <!-- Baseline arrows -->
  <path d="M370 309 H420" class="arrowBlue" marker-end="url(#arrow-blue)"/>
  <path d="M710 309 H760" class="arrowBlue" marker-end="url(#arrow-blue)"/>
  <path d="M1040 309 H1090" class="arrowBlue" marker-end="url(#arrow-blue)"/>

  <!-- Converted arrows -->
  <path d="M370 529 H420" class="arrowGray" marker-end="url(#arrow-gray)"/>
  <path d="M565 368 V470" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M710 529 C734 529, 736 499, 760 499" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M900 558 V595" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M1040 499 H1090" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M1040 654 C1062 654, 1066 730, 1090 730" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M1174 600 V670" class="arrowOrange" marker-end="url(#arrow-orange)"/>
  <path d="M1356 600 V670" class="arrowOrange" marker-end="url(#arrow-orange)"/>

  <!-- Shared arrows -->
  <path d="M610 1012 H990 V309 H1090" class="arrowDashed" marker-end="url(#arrow-gray)"/>
  <path d="M610 1036 H1040 V730 H1090" class="arrowDashed" marker-end="url(#arrow-gray)"/>
  <path d="M1215 970 V830 H1265 V600" class="arrowGray" marker-end="url(#arrow-gray)"/>

  <!-- Legend -->
  <rect x="60" y="1105" width="96" height="24" rx="12" fill="#eef4ff" stroke="#4a78d3" stroke-width="1.6"/>
  <text x="84" y="1121" class="legend">Baseline</text>

  <rect x="175" y="1105" width="126" height="24" rx="12" fill="#fff4ea" stroke="#d97706" stroke-width="1.6"/>
  <text x="192" y="1121" class="legend">Converted path</text>

  <rect x="320" y="1105" width="90" height="24" rx="12" fill="#eef9f1" stroke="#2f855a" stroke-width="1.6"/>
  <text x="343" y="1121" class="legend">Shared</text>
</svg>
